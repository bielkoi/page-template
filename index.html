    <style>
      :root {
        --accent-blue: #007bff;
      }
      body {
        font-family: "Inter", sans-serif;
        letter-spacing: 0.5px;
      }

      /* RE-STABILIZED PREVIEW WINDOW */
      .preview-window {
        width: 100%;
        height: 180px;
        background: #000;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid #1a1a1a;
      }
      .preview-window iframe {
        width: 1280px;
        height: 1200px;
        border: none;
        position: absolute;
        top: 0;
        left: 0;
        transform: scale(0.25);
        transform-origin: 0 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.8s ease;
      }
      .preview-window iframe.loaded {
        opacity: 0.8;
      }
      .review-card:hover iframe.loaded {
        opacity: 1;
      }

      /* TACTICAL UI ELEMENTS */
      .review-card {
        background: #0a0a0a;
        border: 1px solid #1a1a1a;
        transition: transform 0.2s;
        position: relative;
      }
      .review-card:hover {
        border-color: #333;
      }
      .niche-tag,
      .thema-tag {
        position: absolute;
        top: 10px;
        font-size: 0.55rem;
        font-weight: 900;
        padding: 2px 8px;
        z-index: 5;
        text-transform: uppercase;
      }
      .niche-tag {
        left: 10px;
        background: var(--accent-blue);
        color: #000;
      }
      .thema-tag {
        right: 10px;
        background: #222;
        color: #fff;
      }

      .card-body {
        padding: 15px;
      }
      .item-name {
        font-size: 0.8rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 4px;
      }
      .item-type-label {
        font-size: 0.6rem;
        color: #555;
        font-weight: 700;
        text-transform: uppercase;
      }

      .btn-action {
        flex: 1;
        text-align: center;
        padding: 8px;
        font-size: 0.65rem;
        font-weight: 900;
        border: 1px solid #1a1a1a;
        color: #fff;
        text-decoration: none;
        transition: 0.2s;
      }
      .btn-action:hover {
        background: #111;
        border-color: #444;
      }
      .card-actions {
        display: flex;
        gap: 5px;
        margin-top: 15px;
      }

      /* FILTER BUTTONS */
      .filter-btn {
        background: #0a0a0a;
        border: 1px solid #222;
        color: #666;
        padding: 6px 15px;
        font-size: 0.65rem;
        font-weight: 900;
      }
      .filter-btn.active {
        background: var(--accent-blue);
        color: #000;
        border-color: var(--accent-blue);
      }

      /* FOOTER */
      .simple-footer {
        background: #050505;
        border-top: 1px solid #1a1a1a;
        padding: 20px 0;
        margin-top: 40px;
      }
      .footer-wrap {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .system-status-dot {
        width: 6px;
        height: 6px;
        background: var(--accent-blue);
        border-radius: 50%;
        display: inline-block;
        box-shadow: 0 0 8px var(--accent-blue);
      }
      .footer-brand {
        font-size: 0.7rem;
        font-weight: 900;
        color: #fff;
        margin-left: 10px;
      }
      .footer-meta {
        font-size: 0.65rem;
        color: #555;
      }
      .footer-clock {
        font-size: 0.7rem;
        font-weight: 800;
        color: var(--accent-blue);
        background: #0f0f0f;
        padding: 4px 8px;
        border: 1px solid #1a1a1a;
        font-family: monospace;
      }
      .footer-copyright {
        font-size: 0.6rem;
        color: #444;
        font-weight: 800;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body class="bg-black text-white">
    <nav class="navbar navbar-expand-lg border-bottom border-secondary py-3">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-black letter-spacing-2" href="#"
          ><span class="text-primary">CORE</span>_TERMINAL</a
        >
        <div class="ms-auto d-flex align-items-center">
          <span
            class="badge bg-dark border border-secondary text-muted py-2 px-3"
          >
            <span class="system-status-dot me-2"></span>SYSTEM_ONLINE
          </span>
        </div>
      </div>
    </nav>

    <main class="container-fluid p-4">
      <div class="search-container mb-5">
        <div class="row align-items-center g-3">
          <div class="col-md-4">
            <div class="input-group">
              <span
                class="input-group-text bg-black border-secondary text-primary"
                ><i class="bi bi-search"></i
              ></span>
              <input
                type="text"
                id="search-input"
                class="form-control bg-black text-white border-secondary shadow-none"
                placeholder="SEARCH_DATABASE..."
              />
            </div>
          </div>
          <div class="col-md-8 text-md-end">
            <div
              class="filter-group d-flex gap-2 justify-content-md-end flex-wrap"
            >
              <button class="filter-btn active" data-filter="ALL">ALL</button>
              <button class="filter-btn" data-filter="TOGEL">TOGEL</button>
              <button class="filter-btn" data-filter="SLOT">SLOT</button>
              <button class="filter-btn" data-filter="AMP">AMP</button>
            </div>
          </div>
        </div>
      </div>

      <div id="project-grid" class="row g-4"></div>
    </main>

    <footer class="simple-footer">
      <div class="container-fluid px-4">
        <div class="footer-wrap">
          <div class="footer-section">
            <span class="system-status-dot"></span>
            <span class="footer-brand">ARCHIVE_SYSTEM_V3</span>
            <span class="footer-divider">|</span>
            <span id="footer-date" class="footer-meta">2026-04-16</span>
          </div>
          <div class="footer-copyright d-none d-lg-block">
            COPYRIGHT © 2026 <span class="text-white">PROPRIETARY_ENGINE</span>.
            ALL_RIGHTS_RESERVED.
          </div>
          <div class="footer-section">
            <span class="footer-meta d-none d-sm-inline"
              >STATUS: <span class="text-white">OPTIMIZED</span></span
            >
            <span class="footer-divider d-none d-sm-inline">|</span>
            <span id="footer-clock" class="footer-clock">00:00:00</span>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="pagedata.js"></script>
    <script>
      const pageData = [
        {
          name: "KOITOTO_V1",
          type: "Landing Page",
          niche: "Togel",
          thema: "profil",
          url: "lp/formula1.html",
        },
        {
          name: "Yu Gi OH",
          type: "AMP",
          niche: "AMP",
          thema: "AMP",
          url: "amp/yugioh.html",
        },
        {
          name: "Simple AMP",
          type: "AMP",
          niche: "AMP",
          thema: "AMP",
          url: "amp/techno2.html",
        },
        {
          name: "E-commerce Red Black",
          type: "Landing Page",
          niche: "Togel",
          thema: "e-commerce",
          url: "lp/ecom.html",
        },
        {
          name: "Gundam",
          type: "Landing Page",
          niche: "Togel",
          thema: "e-commerce",
          url: "lp/gundam.html",
        },
        {
          name: "Circle Logo",
          type: "Landing Page",
          niche: "Togel",
          thema: "e-commerce",
          url: "lp/ecom2.html",
        },
      ];
      $(document).ready(function () {
        let currentSearchTerm = "";
        let currentNicheFilter = "ALL";

        function renderCards(data) {
          const $grid = $("#project-grid");
          $grid.empty();

          if (data.length === 0) {
            $grid.append(
              '<div class="col-12 text-center py-5 text-primary fw-bold">NO_ASSETS_FOUND</div>',
            );
            return;
          }

          data.forEach((item) => {
            $grid.append(`
                <div class="col-6 col-md-4 col-lg-3 d-flex">
                    <div class="review-card w-100">
                        <div class="niche-tag">${item.niche}</div>
                        <div class="thema-tag">${item.thema}</div>
                        <div class="preview-window">
                            <iframe src="${item.url}" loading="lazy" onload="this.classList.add('loaded')"></iframe>
                        </div>
                        <div class="card-body">
                            <div class="item-name">${item.name}</div>
                            <div class="item-type-label">${item.type}</div>
                            <div class="card-actions">
                                <a href="${item.url}" target="_blank" class="btn-action">VIEW</a>
                                <a href="${item.url}" download="${item.name}.html" class="btn-action">SAVE</a>
                            </div>
                        </div>
                    </div>
                </div>`);
          });
        }

        function applyFilters() {
          const filtered = pageData.filter((item) => {
            // Search by Name or Thema
            const matchesSearch =
              item.name
                .toLowerCase()
                .includes(currentSearchTerm.toLowerCase()) ||
              item.thema
                .toLowerCase()
                .includes(currentSearchTerm.toLowerCase());

            // Match Niche exactly as written in your array
            const matchesNiche =
              currentNicheFilter === "ALL" ||
              item.niche.toUpperCase() === currentNicheFilter;

            return matchesSearch && matchesNiche;
          });
          renderCards(filtered);
        }

        // Search input listener
        $("#search-input").on("input", function () {
          currentSearchTerm = $(this).val();
          applyFilters();
        });

        // Filter button listener
        $(document).on("click", ".filter-btn", function () {
          $(".filter-btn").removeClass("active");
          $(this).addClass("active");
          currentNicheFilter = $(this).data("filter");
          applyFilters();
        });

        // System Clock
        function updateTime() {
          const now = new Date();
          $("#footer-clock").text(now.toTimeString().split(" ")[0]);
          $("#footer-date").text(now.toISOString().split("T")[0]);
        }

        updateTime();
        setInterval(updateTime, 1000);
        renderCards(pageData);
      });
    </script>
  </body>
