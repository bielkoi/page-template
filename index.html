  <body class="bg-black text-white">
    <nav class="navbar navbar-expand-lg border-bottom border-secondary py-3">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-black letter-spacing-2" href="#"
          ><span class="text-primary">GALLERY LP & AMP</a
        >
        <div class="ms-auto d-flex align-items-center">
          <span
            class="badge bg-dark border border-secondary text-light py-2 px-3"
          >
            <span class="system-status-dot me-2"></span>SYSTEM_ONLINE
          </span>
        </div>
      </div>
    </nav>

    <main class="container-fluid p-4">
      <div class="search-container mb-5">
        <div class="row align-items-center g-3">
          <div class="col-md-4">
            <div class="input-group">
              <span
                class="input-group-text bg-black border-secondary text-primary"
                ><i class="bi bi-search"></i
              ></span>
              <input
                type="text"
                id="search-input"
                class="form-control bg-black text-white border-secondary shadow-none"
                placeholder="SEARCH_DATABASE..."
              />
            </div>
          </div>
          <div class="col-md-8 text-md-end">
            <div
              class="filter-group d-flex gap-2 justify-content-md-end flex-wrap"
            >
              <button class="filter-btn active" data-filter="ALL">ALL</button>
              <button class="filter-btn" data-filter="TOGEL">TOGEL</button>
              <button class="filter-btn" data-filter="SLOT">SLOT</button>
              <button class="filter-btn" data-filter="AMP">AMP</button>
            </div>
          </div>
        </div>
      </div>

      <div id="project-grid" class="row g-4"></div>
    </main>

    <footer class="simple-footer">
      <div class="container-fluid px-4">
        <div class="footer-wrap">
          <div class="footer-section">
            <span class="system-status-dot"></span>
            <span class="footer-brand">ARCHIVE_SYSTEM_V3</span>
            <span class="footer-divider">|</span>
            <span id="footer-date" class="footer-meta">2026-04-16</span>
          </div>
          <div class="footer-copyright d-none d-lg-block">
            COPYRIGHT © 2026 <span class="text-white">PROPRIETARY_BI-EL</span>
            ALL_RIGHTS_RESERVED.
          </div>
          <div class="footer-section">
            <span class="footer-meta d-none d-sm-inline"
              >STATUS: <span class="text-white">OPTIMIZED</span></span
            >
            <span class="footer-divider d-none d-sm-inline">|</span>
            <span id="footer-clock" class="footer-clock">00:00:00</span>
          </div>
        </div>
      </div>
    </footer>

    <div id="preview-modal" class="terminal-modal">
      <div class="modal-backdrop-blur"></div>
      <div class="modal-content-wrapper">
        <div class="modal-toolbar">
          <div class="toolbar-left">
            <span class="status-dot blink"></span>
            <span id="modal-project-name">PROJECT_PREVIEW</span>
          </div>
          <div class="toolbar-right">
            <button class="modal-ctrl-btn" id="close-modal">
              <i class="bi bi-x-lg"></i> CLOSE_ESC
            </button>
          </div>
        </div>
        <div class="modal-body-frame">
          <iframe id="fullscreen-iframe" src=""></iframe>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://bielkoi.github.io/bielkoi-asset/js/biel-dkfj2ijiwsjdsa.js"></script>
    <script>
      $(document).ready(function () {
        let currentSearchTerm = "";
        let currentNicheFilter = "ALL";

        // Function to handle asset download
        window.downloadAsset = function (url, filename) {
          const link = document.createElement("a");
          link.href = url;

          // Attempt to force download
          // Note: Works best if the URL is on the same domain or has CORS headers
          link.setAttribute(
            "download",
            filename.replace(/\s+/g, "_").toUpperCase() + ".html",
          );

          // For external github/other URLs, this will open in new tab if download is blocked
          link.target = "_blank";

          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);

          console.log(`INITIATING_DOWNLOAD: ${filename}`);
        };

        // Function to Open Modal
        window.openPreview = function (url, name) {
          $("#modal-project-name").text(name.toUpperCase());
          $("#fullscreen-iframe").attr("src", url);
          $("#preview-modal").addClass("active");
          $("body").css("overflow", "hidden"); // Prevent scrolling
        };

        // Close Modal Logic
        $("#close-modal").on("click", function () {
          $("#preview-modal").removeClass("active");
          $("#fullscreen-iframe").attr("src", ""); // Stop audio/video in iframe
          $("body").css("overflow", "auto");
        });

        // Close on ESC key
        $(document).on("keyup", function (e) {
          if (e.key === "Escape") $("#close-modal").click();
        });

        // 1. New Sorting Function
        function sortDataByDate(data) {
          return data.sort((a, b) => {
            return new Date(b.date) - new Date(a.date);
          });
        }

        function renderCards(data) {
          const $grid = $("#project-grid");
          $grid.empty();

          // Sort data before rendering
          const sortedData = sortDataByDate(data);

          if (sortedData.length === 0) {
            $grid.append(
              '<div class="col-12 text-center py-5 text-primary fw-bold">NO_ASSETS_FOUND</div>',
            );
            return;
          }

          sortedData.forEach((item) => {
            // Determine the color class based on Niche
    const nicheClass = `card-niche-${item.niche.toLowerCase()}`;
            $grid.append(`
        <div class="col-6 col-md-4 col-lg-3 d-flex">
            <div class="review-card w-100 ${nicheClass}">
                <div class="niche-tag">${item.niche}</div>
                <div class="thema-tag">${item.thema}</div>
                <div class="preview-window" onclick="openPreview('${item.url}', '${item.name}')">
                    <iframe src="${item.url}" loading="lazy" onload="this.classList.add('loaded')"></iframe>
                    <div class="preview-overlay">
                        <span class="preview-btn">[   ]</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="item-name">${item.name}</div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="item-type-label">${item.type}</div>
                        <div class="item-date-label">${item.date}</div>
                    </div>
                    <div class="card-actions">
                        <button onclick="openPreview('${item.url}', '${item.name}')" class="btn-action btn-main">PREVIEW</button>
                        <button onclick="downloadAsset('${item.url}', '${item.name}')" class="btn-action">
                            DOWNLOAD<i class="bi bi-download"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>`);
          });
        }

        function applyFilters() {
          const filtered = pageData.filter((item) => {
            // Search by Name or Thema
            const matchesSearch =
              item.name
                .toLowerCase()
                .includes(currentSearchTerm.toLowerCase()) ||
              item.thema
                .toLowerCase()
                .includes(currentSearchTerm.toLowerCase());

            // Match Niche exactly as written in your array
            const matchesNiche =
              currentNicheFilter === "ALL" ||
              item.niche.toUpperCase() === currentNicheFilter;

            return matchesSearch && matchesNiche;
          });
          renderCards(filtered);
        }

        // Search input listener
        $("#search-input").on("input", function () {
          currentSearchTerm = $(this).val();
          applyFilters();
        });

        // Filter button listener
        $(document).on("click", ".filter-btn", function () {
          $(".filter-btn").removeClass("active");
          $(this).addClass("active");
          currentNicheFilter = $(this).data("filter");
          applyFilters();
        });

        // System Clock
        function updateTime() {
          const now = new Date();
          $("#footer-clock").text(now.toTimeString().split(" ")[0]);
          $("#footer-date").text(now.toISOString().split("T")[0]);
        }

        updateTime();
        setInterval(updateTime, 1000);
        renderCards(pageData);
      });
    </script>
  </body>
</html>
